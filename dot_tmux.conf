unbind r
bind r source-file ~/.tmux.conf
set -g prefix C-s
# set -g prefix M-s

# vi mode in tmux
# use prefix + [ to enter vi mode
# you can move, search, select and copy using vim bindings
set-window-option -g mode-keys vi

bind-key -T copy-mode-vi 'v' send -X begin-selection # in vi mode begin selection with v 
bind-key -T copy-mode-vi 'y' send -X copy-pipe-and-cancel # copy selected and cancel selection

unbind-key C-b
unbind-key -n /

bind-key C-s send-prefix

set -g mouse on
set -g allow-passthrough on

set -ga update-environment TERM
set -ga update-environment TERM_PROGRAM

bind c new-window -c "#{pane_current_path}"
bind - split-window -c "#{pane_current_path}"
bind | split-window -h -c "#{pane_current_path}"  

# Start windows and panes at 1 instead of 0
set -g base-index 1
set -g pane-base-index 1
set -g renumber-windows on

# Vim-style pane navigation
bind-key h select-pane -L
bind-key j select-pane -D
bind-key k select-pane -U
bind-key l select-pane -R

# open window at number with Alt + number
bind -n M-1 select-window -t :1
bind -n M-2 select-window -t :2
bind -n M-3 select-window -t :3
bind -n M-4 select-window -t :4
bind -n M-5 select-window -t :5
bind -n M-6 select-window -t :6
bind -n M-7 select-window -t :7
bind -n M-8 select-window -t :8
bind -n M-9 select-window -t :9

# popups
# bind -n M-y display-popup -d "#{pane_current_path}" -w 80% -h 80% -E "yazi"
bind -n M-y display-popup -d '#{pane_current_path}' -w 80% -h 80% -E 'tmux new-session yazi \; set status off'
bind -n M-v display-popup -d "#{pane_current_path}" -w 80% -h 80% -E "lazygit"

# fzf integration for session and window switching (both upper and lowercase)
bind s display-popup -E -w 80% -h 60% "tmux list-sessions -F '#{session_name}: #{session_windows} windows#{?session_attached, (attached),}' | fzf --prompt='Switch to session: ' | cut -d: -f1 | xargs -I {} tmux switch-client -t {}"
bind S display-popup -E -w 80% -h 60% "tmux list-sessions -F '#{session_name}: #{session_windows} windows#{?session_attached, (attached),}' | fzf --prompt='Switch to session: ' | cut -d: -f1 | xargs -I {} tmux switch-client -t {}"
bind w display-popup -E -w 80% -h 60% "tmux list-windows -F '#{window_index}: #{window_name}#{?window_active, (active),}' | fzf --prompt='Switch to window: ' | cut -d: -f1 | xargs -I {} tmux select-window -t {}"
bind W display-popup -E -w 80% -h 60% "tmux list-windows -F '#{window_index}: #{window_name}#{?window_active, (active),}' | fzf --prompt='Switch to window: ' | cut -d: -f1 | xargs -I {} tmux select-window -t {}"

# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin "https://gitlab.com/motaz-shokry/gruvbox-tmux"

set -g @gruvbox_status_modules_right "git_status date_time battery"

set -g @gruvbox-tmux_theme "soft"  # medium | soft | Default is hard  
set -g @gruvbox-tmux_transparent 1   # 1 | 0

set -g @gruvbox-tmux_time_format 12H

set -g @gruvbox-tmux_show_battery_widget 1     # 0 to disable
set -g @gruvbox-tmux_battery_name "BAT1"       # run `ls /sys/class/power_supply` to know
set -g @gruvbox-tmux_battery_low_threshold 25 

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'
